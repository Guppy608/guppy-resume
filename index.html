<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guppy | AI Product & Research</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="site-shell">
        <aside class="side-rail" aria-label="Site navigation">
            <a href="#home" class="rail-mark">G</a>
            <nav>
                <a href="#profile" data-i18n="nav.profile"></a>
                <a href="#work" data-i18n="nav.work"></a>
                <a href="#life" data-i18n="nav.life"></a>
                <a href="#contact" data-i18n="nav.contact"></a>
            </nav>
            <button id="langToggle" class="lang-toggle" type="button">EN</button>
        </aside>

        <main>
            <section id="home" class="hero-section">
                <div class="hero-copy animate-on-scroll">
                    <h1 data-i18n="hero.name"></h1>
                    <p class="hero-role">
                        <span class="typing-text"></span><span class="cursor">|</span>
                    </p>
                    <p class="hero-subtitle" data-i18n="hero.subtitle"></p>
                    <div class="hero-actions">
                        <a href="#work" class="text-link" data-i18n="hero.cta.work"></a>
                        <a href="#life" class="text-link muted" data-i18n="hero.cta.life"></a>
                    </div>
                </div>
                <figure class="hero-portrait animate-on-scroll">
                    <img src="images/hero-bg.jpg" alt="Guppy portrait">
                </figure>
            </section>

            <section id="profile" class="split-section">
                <div class="section-heading animate-on-scroll">
                    <p class="eyebrow" data-i18n="profile.kicker"></p>
                    <h2 data-i18n="profile.title"></h2>
                </div>
                <div class="section-body animate-on-scroll">
                    <p class="lead" data-i18n="profile.lead"></p>
                    <div class="metric-grid">
                        <article>
                            <strong>1</strong>
                            <span data-i18n="metric.product"></span>
                        </article>
                        <article>
                            <strong>5</strong>
                            <span data-i18n="metric.papers"></span>
                        </article>
                        <article>
                            <strong>10</strong>
                            <span data-i18n="metric.patents"></span>
                        </article>
                        <article>
                            <strong>20</strong>
                            <span data-i18n="metric.validation"></span>
                        </article>
                    </div>
                </div>
            </section>

            <section class="feature-strip">
                <article class="feature-card animate-on-scroll">
                    <span>01</span>
                    <h3 data-i18n="feature1.title"></h3>
                    <p data-i18n="feature1.desc"></p>
                </article>
                <article class="feature-card animate-on-scroll">
                    <span>02</span>
                    <h3 data-i18n="feature2.title"></h3>
                    <p data-i18n="feature2.desc"></p>
                </article>
                <article class="feature-card animate-on-scroll">
                    <span>03</span>
                    <h3 data-i18n="feature3.title"></h3>
                    <p data-i18n="feature3.desc"></p>
                </article>
            </section>

            <section id="work" class="work-section">
                <div class="section-heading animate-on-scroll">
                    <p class="eyebrow" data-i18n="exp.kicker"></p>
                    <h2 data-i18n="exp.section"></h2>
                </div>

                <article class="work-item animate-on-scroll">
                    <figure>
                        <img src="images/exp-1.png" alt="AI home design product">
                    </figure>
                    <div class="work-copy">
                        <span class="date" data-i18n="exp1.date"></span>
                        <h3 data-i18n="exp1.title"></h3>
                        <p class="company" data-i18n="exp1.company"></p>
                        <div class="exp-desc" data-i18n="exp1.desc.full"></div>
                    </div>
                </article>

                <article class="work-item reverse animate-on-scroll">
                    <figure>
                        <img src="images/exp-2.jpg" alt="Imperial College London">
                    </figure>
                    <div class="work-copy">
                        <span class="date" data-i18n="exp2.date"></span>
                        <h3 data-i18n="exp2.title"></h3>
                        <p class="company" data-i18n="exp2.company"></p>
                        <div class="exp-desc" data-i18n="exp2.desc.full"></div>
                    </div>
                </article>

                <article class="work-item animate-on-scroll">
                    <figure>
                        <img src="images/exp-3.jpg" alt="JD Logistics">
                    </figure>
                    <div class="work-copy">
                        <span class="date" data-i18n="exp3.date"></span>
                        <h3 data-i18n="exp3.title"></h3>
                        <p class="company" data-i18n="exp3.company"></p>
                        <div class="exp-desc" data-i18n="exp3.desc.full"></div>
                    </div>
                </article>

                <div class="education-list">
                    <article class="work-item education-item animate-on-scroll">
                        <figure>
                            <img src="images/exp-4.jpg" alt="USTB master's degree">
                        </figure>
                        <div class="work-copy">
                            <span class="date" data-i18n="exp4.date"></span>
                            <h3 data-i18n="exp4.title"></h3>
                            <p class="company" data-i18n="exp4.company"></p>
                            <div class="exp-desc" data-i18n="exp4.desc.full"></div>
                        </div>
                    </article>
                    <article class="work-item education-item reverse animate-on-scroll">
                        <figure>
                            <img src="images/exp-5.jpg" alt="USTB bachelor's degree">
                        </figure>
                        <div class="work-copy">
                            <span class="date" data-i18n="exp5.date"></span>
                            <h3 data-i18n="exp5.title"></h3>
                            <p class="company" data-i18n="exp5.company"></p>
                            <div class="exp-desc" data-i18n="exp5.desc.full"></div>
                        </div>
                    </article>
                </div>
            </section>

            <section id="life" class="life-section">
                <div class="section-heading animate-on-scroll">
                    <p class="eyebrow" data-i18n="life.kicker"></p>
                    <h2 data-i18n="life.title"></h2>
                </div>
                <div class="life-grid">
                    <div class="travel-shelf animate-on-scroll" aria-label="Travel shelf">
                        <article class="shelf-group">
                            <span class="shelf-continent">欧洲 / Europe</span>
                            <button class="travel-place is-active" type="button" data-country="spain">
                                <strong>西班牙</strong>
                                <span>Spain</span>
                            </button>
                            <button class="travel-place" type="button" data-country="portugal">
                                <strong>葡萄牙</strong>
                                <span>Portugal</span>
                            </button>
                        </article>
                        <article class="shelf-group">
                            <span class="shelf-continent">北美洲 / North America</span>
                            <button class="travel-place" type="button" data-country="us">
                                <strong>美国</strong>
                                <span>United States</span>
                            </button>
                            <button class="travel-place" type="button" data-country="mexico">
                                <strong>墨西哥</strong>
                                <span>Mexico</span>
                            </button>
                        </article>
                        <article class="shelf-group">
                            <span class="shelf-continent">亚洲 / Asia</span>
                            <button class="travel-place" type="button" data-country="singapore">
                                <strong>新加坡</strong>
                                <span>Singapore</span>
                            </button>
                            <button class="travel-place" type="button" data-country="hongkong">
                                <strong>香港</strong>
                                <span>Hong Kong</span>
                            </button>
                            <button class="travel-place" type="button" data-country="korea">
                                <strong>韩国</strong>
                                <span>South Korea</span>
                            </button>
                            <button class="travel-place" type="button" data-country="macau">
                                <strong>澳门</strong>
                                <span>Macau</span>
                            </button>
                            <button class="travel-place" type="button" data-country="malaysia">
                                <strong>马来西亚</strong>
                                <span>Malaysia</span>
                            </button>
                            <button class="travel-place" type="button" data-country="philippines">
                                <strong>菲律宾</strong>
                                <span>Philippines</span>
                            </button>
                        </article>
                    </div>
                    <div class="travel-notes animate-on-scroll">
                        <article class="travel-card is-active" data-travel-card="spain">
                            <span data-i18n="travel.spain.meta"></span>
                            <h3 data-i18n="travel.spain.title"></h3>
                            <p data-i18n="travel.spain.desc"></p>
                        </article>
                        <article class="travel-card" data-travel-card="portugal">
                            <span data-i18n="travel.portugal.meta"></span>
                            <h3 data-i18n="travel.portugal.title"></h3>
                            <p data-i18n="travel.portugal.desc"></p>
                        </article>
                        <article class="travel-card" data-travel-card="us">
                            <span data-i18n="travel.us.meta"></span>
                            <h3 data-i18n="travel.us.title"></h3>
                            <p data-i18n="travel.us.desc"></p>
                        </article>
                        <article class="travel-card" data-travel-card="mexico">
                            <span data-i18n="travel.mexico.meta"></span>
                            <h3 data-i18n="travel.mexico.title"></h3>
                            <p data-i18n="travel.mexico.desc"></p>
                        </article>
                        <article class="travel-card" data-travel-card="singapore">
                            <span data-i18n="travel.singapore.meta"></span>
                            <h3 data-i18n="travel.singapore.title"></h3>
                            <p data-i18n="travel.singapore.desc"></p>
                        </article>
                        <article class="travel-card" data-travel-card="hongkong">
                            <span data-i18n="travel.hongkong.meta"></span>
                            <h3 data-i18n="travel.hongkong.title"></h3>
                            <p data-i18n="travel.hongkong.desc"></p>
                        </article>
                        <article class="travel-card" data-travel-card="korea">
                            <span data-i18n="travel.korea.meta"></span>
                            <h3 data-i18n="travel.korea.title"></h3>
                            <p data-i18n="travel.korea.desc"></p>
                        </article>
                        <article class="travel-card" data-travel-card="macau">
                            <span data-i18n="travel.macau.meta"></span>
                            <h3 data-i18n="travel.macau.title"></h3>
                            <p data-i18n="travel.macau.desc"></p>
                        </article>
                        <article class="travel-card" data-travel-card="malaysia">
                            <span data-i18n="travel.malaysia.meta"></span>
                            <h3 data-i18n="travel.malaysia.title"></h3>
                            <p data-i18n="travel.malaysia.desc"></p>
                        </article>
                        <article class="travel-card" data-travel-card="philippines">
                            <span data-i18n="travel.philippines.meta"></span>
                            <h3 data-i18n="travel.philippines.title"></h3>
                            <p data-i18n="travel.philippines.desc"></p>
                        </article>
                    </div>
                </div>
            </section>

            <section id="contact" class="contact-section">
                <div class="section-heading animate-on-scroll">
                    <p class="eyebrow" data-i18n="contact.kicker"></p>
                    <h2 data-i18n="contact.section"></h2>
                </div>
                <div class="contact-body animate-on-scroll">
                    <p data-i18n="contact.intro"></p>
                    <div class="contact-links">
                        <a href="mailto:Guppy608@outlook.com">
                            <span>@</span>
                            <span data-i18n="contact.email"></span>
                        </a>
                        <a href="https://github.com/Guppy608" target="_blank" rel="noreferrer">
                            <span>&lt;/&gt;</span>
                            <span data-i18n="contact.github"></span>
                        </a>
                        <a href="https://www.zhihu.com/people/Guppy0608/posts" target="_blank" rel="noreferrer">
                            <span>Zh</span>
                            <span data-i18n="contact.zhihu"></span>
                        </a>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/content.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
